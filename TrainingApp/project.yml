name: Training
# Version: MARKETING_VERSION = user-facing (e.g. 1.0.1). CURRENT_PROJECT_VERSION
# = build number; increment for every App Store / TestFlight upload. Info.plist
# maps both via $(MARKETING_VERSION) and $(CURRENT_PROJECT_VERSION). Edit here and
# run `xcodegen generate` in this folder, or change Version / Build in Xcode’s
# target General tab (no regen needed).
options:
  bundleIdPrefix: com.jatler
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.2"
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig

targets:
  Training:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: Training.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.jatler.Training
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0.1" # short version / CFBundleShortVersionString
        CURRENT_PROJECT_VERSION: "2" # build / CFBundleVersion
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: "SWAP Training"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: WHKX4QF56D
        # Set to YES in Secrets.xcconfig to show “Skip Sign-In (Dev)” on Release/device builds.
        DEV_SIGNIN_ALLOWED: "NO"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    dependencies:
      - package: Supabase
        product: Supabase
      - package: Supabase
        product: Auth
    entitlements:
      path: Training.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default

  TrainingTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: Training

schemes:
  Training:
    build:
      targets:
        Training: all
        TrainingTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TrainingTests
